version: "2"

formatters:
  enable:
    - gofmt
  exclusions:
    paths:
      - library
      - dist

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
  settings:
    errcheck:
      exclude-functions:
        # CLI output — failure means stdout is broken, nothing to recover.
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - (io.Writer).Write
  exclusions:
    paths:
      - library
      - dist
    rules:
      # Test files: unchecked errors in setup/cleanup helpers are noise.
      - path: '_test\.go'
        linters:
          - errcheck
